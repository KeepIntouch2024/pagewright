# "cool" theme — a cooler, tech/blue alternative to prove theming is just tokens.
[colors]
red = "#2563EB"      # accent (named "red" for CSS-var compatibility)
red2 = "#1D4ED8"
ink = "#0f172a"
ink2 = "#1e293b"
paper = "#F8FAFC"
cream = "#EEF2F7"
cream2 = "#E2E8F0"
teal = "#0E7490"
gold = "#0891B2"     # "flagship" accent
muted = "#64748b"
line = "#dbe3ec"
line2 = "#cbd5e1"
dark = "#0b1220"

[fonts]
cjk = '"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif'
latin = '"Helvetica Neue",Helvetica,Arial,sans-serif'

[layout]
width = 750
