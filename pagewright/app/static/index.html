<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pagewright</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ───────────────── App bar ───────────────── -->
<header class="appbar">
  <div class="brand">
    <span class="mark" aria-hidden="true">
      <svg viewBox="0 0 32 32" width="22" height="22"><path d="M6 26V6h11a7 7 0 0 1 0 14H11" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
    <span class="brand-text">Pagewright<em data-i18n="tagline">详情页工作室</em></span>
  </div>
  <div class="appbar-right">
    <button id="langBtn" class="lang-toggle" title="切换语言 / Switch language"><span>EN</span></button>
    <button id="statusPill" class="pill" title="模型状态">
      <span class="dot"></span><span id="statusText" data-i18n="status.unset">未配置模型</span>
    </button>
    <button id="historyBtn" class="icon-btn" data-i18n-title="history" title="历史" aria-label="历史">
      <svg viewBox="0 0 24 24" width="19" height="19"><path d="M12 8v4l3 2M3.5 12a8.5 8.5 0 1 0 2.5-6M3 4v4h4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button id="settingsBtn" class="icon-btn" data-i18n-title="settings" title="设置" aria-label="设置">
      <svg viewBox="0 0 24 24" width="19" height="19"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M19.4 12.9a1.7 1.7 0 0 1 0-1.8l1.2-1.7-2-3.4-2 .7a1.7 1.7 0 0 1-1.6-.9L14.3 3h-4l-.7 2.8a1.7 1.7 0 0 1-1.6.9l-2-.7-2 3.4 1.2 1.7a1.7 1.7 0 0 1 0 1.8L3.3 14.6l2 3.4 2-.7a1.7 1.7 0 0 1 1.6.9l.7 2.8h4l.7-2.8a1.7 1.7 0 0 1 1.6-.9l2 .7 2-3.4-1.2-1.7Z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
    </button>
  </div>
</header>

<!-- ───────────────── Studio ───────────────── -->
<main class="studio">

  <!-- Left · Composer -->
  <section class="panel composer">
    <div class="panel-scroll">
      <div class="seg" role="tablist">
        <button class="seg-btn active" data-mode="manual" role="tab">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M4 16l4-4 4 4 3-3 5 5M4 5h16v14H4z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="9" cy="9" r="1.6" fill="currentColor"/></svg>
          <span data-i18n="tab.manual">上传素材</span>
        </button>
        <button class="seg-btn" data-mode="url" role="tab">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M9 15l6-6M10 6l1-1a4 4 0 0 1 6 6l-1 1M14 18l-1 1a4 4 0 0 1-6-6l1-1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <span data-i18n="tab.url">商品链接</span>
        </button>
        <span class="seg-ind" aria-hidden="true"></span>
      </div>

      <!-- Manual -->
      <div id="pane-manual" class="pane">
        <div class="field-label" data-i18n="manual.images">商品图片</div>
        <div id="drop" class="dropzone" tabindex="0">
          <input id="fileInput" type="file" accept="image/*" multiple hidden>
          <svg class="dz-ico" viewBox="0 0 24 24" width="30" height="30"><path d="M12 16V5m0 0l-4 4m4-4l4 4M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div class="dz-title" data-i18n-html="dz.title">拖入图片，或 <span class="link">点击选择</span></div>
          <div class="dz-sub" data-i18n="dz.sub">包装图 · 实拍图 · 规格图 — 越全越好</div>
        </div>
        <div id="thumbs" class="thumbs"></div>

        <label class="field" for="desc">
          <span class="field-label" data-i18n="manual.desc">商品描述 / 卖点 / 规格</span>
          <textarea id="desc" rows="7" data-i18n-ph="manual.descPh" placeholder="把商品名称、价格、卖点、规格参数粘进来，中英文皆可。信息越完整，生成越精准。"></textarea>
          <span id="descCount" class="counter">0</span>
        </label>
      </div>

      <!-- URL -->
      <div id="pane-url" class="pane hidden">
        <label class="field" for="url">
          <span class="field-label" data-i18n="url.label">商品页链接</span>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M9 15l6-6M10 6l1-1a4 4 0 0 1 6 6l-1 1M14 18l-1 1a4 4 0 0 1-6-6l1-1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
            <input id="url" type="url" placeholder="https://…">
          </div>
        </label>
        <p class="note" data-i18n="url.note">遇到需登录 / 验证的站点可能抓不全，建议改用「上传素材」。</p>
      </div>

      <div class="divider"></div>

      <div class="opts">
        <label class="field compact">
          <span class="field-label" data-i18n="opt.lang">目标语言</span>
          <div class="select-wrap">
            <select id="targetLang">
              <option value="zh-CN" data-i18n="lang.zh">中文（中英对照）</option>
              <option value="" data-i18n="lang.none">原文不翻译</option>
              <option value="en" data-i18n="lang.en">English</option>
              <option value="ja" data-i18n="lang.ja">日本語</option>
            </select>
            <svg class="chev" viewBox="0 0 24 24" width="16" height="16"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          </div>
        </label>
        <label class="field compact">
          <span class="field-label" data-i18n="opt.style">视觉风格</span>
          <div class="select-wrap">
            <select id="theme">
              <option value="editorial" data-i18n="style.editorial">Editorial · 暖色高级</option>
              <option value="cool" data-i18n="style.cool">Cool · 科技蓝</option>
            </select>
            <svg class="chev" viewBox="0 0 24 24" width="16" height="16"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
          </div>
        </label>
      </div>
    </div>

    <div class="composer-foot">
      <button id="genBtn" class="cta">
        <span data-i18n="cta">生成详情页</span>
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M5 12h14m-6-6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <p class="privacy" data-i18n="privacy">图片与生成全程在本机；仅你配置的模型调用会联网。</p>
    </div>
  </section>

  <!-- Right · Canvas -->
  <section class="panel canvas">
    <div id="stateEmpty" class="canvas-state">
      <div class="mock" aria-hidden="true">
        <div class="mock-bar"></div><div class="mock-line w70"></div><div class="mock-line w40"></div>
        <div class="mock-grid"><i></i><i></i><i></i></div>
        <div class="mock-line w60"></div><div class="mock-line w30"></div>
      </div>
      <h2 data-i18n="empty.title">预览区</h2>
      <p data-i18n="empty.sub">生成的长图会在这里呈现，可直接下载整图或分段。</p>
    </div>

    <div id="stateProgress" class="canvas-state hidden">
      <div class="prog-card">
        <div class="prog-head"><span class="orbit"></span><h3 id="progTitle" data-i18n="prog.title">正在生成…</h3></div>
        <ol id="progressList" class="timeline"></ol>
      </div>
    </div>

    <div id="stateResult" class="canvas-state result hidden">
      <div class="result-bar">
        <div class="result-meta"><span class="check">✓</span><span id="resultDim" data-i18n="result.done">完成</span></div>
        <div class="result-actions" id="downloads"></div>
      </div>
      <div class="paper-frame"><div id="preview" class="paper"></div></div>
      <div id="panelStrip" class="panel-strip"></div>
    </div>
  </section>
</main>

<!-- ───────────────── Settings modal ───────────────── -->
<div id="settings" class="modal-host hidden">
  <div class="modal-backdrop" data-close></div>
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 data-i18n="set.title">模型设置</h2>
      <button class="icon-btn" data-close aria-label="close">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
    </div>
    <p class="modal-sub" data-i18n="set.sub">本工具不内置任何模型。填入你自己的 Key —— 仅保存在本机，不上传。</p>

    <div class="provider-cards">
      <button class="prov-card active" data-prov="anthropic">
        <span class="prov-name">Claude</span><span class="prov-desc" data-i18n="prov.claude">Anthropic 官方</span>
      </button>
      <button class="prov-card" data-prov="openai">
        <span class="prov-name" data-i18n="prov.openaiName">OpenAI / 兼容 / 本地</span><span class="prov-desc" data-i18n="prov.openaiDesc">含 Ollama、DeepSeek、通义…</span>
      </button>
    </div>

    <label class="field">
      <span class="field-label">API Key</span>
      <div class="input-wrap">
        <input id="apiKey" type="password" data-i18n-ph="set.keyPh" placeholder="粘贴你的 API Key">
        <button id="toggleKey" class="ghost-icon" type="button" aria-label="toggle">
          <svg viewBox="0 0 24 24" width="17" height="17"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" fill="none" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="2.6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
      </div>
    </label>

    <label id="baseUrlRow" class="field hidden">
      <span class="field-label" data-i18n="set.baseUrl">接口地址 Base URL</span>
      <input id="baseUrl" type="text" placeholder="http://localhost:11434/v1">
    </label>

    <label class="field">
      <span class="field-label" data-i18n-html="set.model">模型 <em class="opt">可留空用默认</em></span>
      <input id="model" type="text" placeholder="claude-opus-4-8 / gpt-4o / qwen2.5vl">
    </label>

    <p class="note" data-i18n-html="set.note">从图片 / 描述生成需要一个<b>支持看图</b>的模型；纯渲染则无需模型。</p>

    <div class="modal-foot">
      <button id="closeSettings" class="btn-ghost" data-close data-i18n="set.cancel">取消</button>
      <button id="saveSettings" class="btn-primary" data-i18n="set.save">保存设置</button>
    </div>
  </div>
</div>

<!-- ───────────────── Library / History ───────────────── -->
<div id="library" class="lib-host hidden">
  <div class="lib-panel">
    <div class="lib-head">
      <h2 data-i18n="lib.title">作品库</h2>
      <button class="icon-btn" data-lib-close aria-label="close">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div id="libBody" class="lib-body"></div>
  </div>
</div>

<!-- lightbox -->
<div id="lightbox" class="lightbox hidden">
  <button class="lb-close" data-lb-close aria-label="close">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <div class="lb-scroll"><img id="lightboxImg" alt=""></div>
</div>

<div id="toastHost" class="toast-host"></div>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
