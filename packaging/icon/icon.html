<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;background:transparent}
.stage{width:1024px;height:1024px;display:flex;align-items:center;justify-content:center}
.sq{width:840px;height:840px;border-radius:188px;
  background:linear-gradient(150deg,#34343d 0%,#16161A 70%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 6px 22px rgba(255,255,255,.10), inset 0 -10px 40px rgba(0,0,0,.45);
  position:relative;overflow:hidden}
.sq::after{content:"";position:absolute;top:-180px;left:-180px;width:560px;height:560px;
  background:radial-gradient(circle,rgba(255,255,255,.10),transparent 60%)}
.dot{position:absolute;right:300px;bottom:286px;width:46px;height:46px;border-radius:50%;background:#DD2A12}
</style></head><body>
<div class="stage"><div class="sq">
  <svg viewBox="0 0 32 32" width="500" height="500" style="margin-left:-14px">
    <path d="M6 26V6h11a7 7 0 0 1 0 14H11" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span class="dot"></span>
</div></div>
</body></html>
